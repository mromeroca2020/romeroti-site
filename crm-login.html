<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Romanoti CRM Login</title>

  <style>
    :root {
      --navy: #07152d;
      --navy-2: #10254d;
      --gold: #d9b56d;
      --border: #d7e2ee;
      --text: #172033;
      --muted: #6b7280;
      --shadow-lg: 0 24px 60px rgba(15, 23, 42, 0.16);
      --shadow-md: 0 16px 34px rgba(15, 23, 42, 0.10);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Segoe UI", Arial, sans-serif;
      min-height: 100vh;
      background:
        radial-gradient(circle at top left, rgba(217,181,109,0.10), transparent 28%),
        linear-gradient(135deg, #061227 0%, #0d2346 48%, #14305c 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 28px;
      color: #fff;
    }

    .login-shell {
      width: 100%;
      max-width: 980px;
      display: grid;
      grid-template-columns: 0.95fr 1.05fr;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.10);
      border-radius: 28px;
      overflow: hidden;
      box-shadow: var(--shadow-lg);
      backdrop-filter: blur(12px);
    }

    .login-left {
      padding: 52px 42px;
      background:
        radial-gradient(circle at top left, rgba(217,181,109,0.12), transparent 24%),
        linear-gradient(180deg, rgba(255,255,255,0.05), rgba(255,255,255,0.02));
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .eyebrow {
      display: inline-block;
      width: fit-content;
      padding: 8px 12px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 800;
      letter-spacing: 0.6px;
      text-transform: uppercase;
      background: rgba(217,181,109,0.14);
      border: 1px solid rgba(217,181,109,0.22);
      color: #f4deb0;
      margin-bottom: 18px;
    }

    .hero-title {
      font-size: 42px;
      line-height: 1.02;
      font-weight: 900;
      margin: 0 0 14px;
      letter-spacing: -0.8px;
    }

    .hero-copy {
      max-width: 380px;
      color: rgba(255,255,255,0.78);
      font-size: 15px;
      line-height: 1.6;
    }

    .login-right {
      background: #ffffff;
      color: var(--text);
      padding: 42px 34px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .login-card {
      width: 100%;
      max-width: 420px;
    }

    .brand-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 18px;
    }

    .brand-mark {
      width: 14px;
      height: 40px;
      border-radius: 999px;
      background: linear-gradient(180deg, var(--gold), #f0d390);
      box-shadow: 0 0 18px rgba(217,181,109,0.35);
    }

    .brand-text {
      display: flex;
      flex-direction: column;
      gap: 3px;
    }

    .brand-title {
      font-size: 30px;
      font-weight: 900;
      color: var(--navy);
      line-height: 1;
    }

    .brand-subtitle {
      font-size: 13px;
      color: var(--muted);
    }

    .intro {
      font-size: 14px;
      color: var(--muted);
      line-height: 1.6;
      margin-bottom: 22px;
    }

    .field {
      margin-bottom: 16px;
    }

    .label {
      display: block;
      margin-bottom: 7px;
      font-size: 11px;
      font-weight: 800;
      color: #64748b;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    input {
      width: 100%;
      padding: 14px 15px;
      border: 1px solid #cfd9e5;
      border-radius: 14px;
      outline: none;
      font-size: 14px;
      font-family: inherit;
      transition: border-color 0.15s ease, box-shadow 0.15s ease, transform 0.15s ease;
      background: #fbfdff;
    }

    input:focus {
      border-color: #9bb9dd;
      box-shadow: 0 0 0 5px rgba(59,130,246,0.09);
      transform: translateY(-1px);
    }

    .actions {
      display: grid;
      gap: 12px;
      margin-top: 18px;
    }

    .btn {
      width: 100%;
      border: none;
      border-radius: 14px;
      padding: 14px 16px;
      font-size: 14px;
      font-weight: 800;
      cursor: pointer;
      transition: transform 0.15s ease, box-shadow 0.15s ease, opacity 0.15s ease;
    }

    .btn:hover {
      transform: translateY(-1px);
      box-shadow: var(--shadow-md);
    }

    .btn-primary {
      color: white;
      background: linear-gradient(135deg, var(--navy), var(--navy-2));
    }

    .btn-secondary {
      color: var(--navy);
      background: #f8fbff;
      border: 1px solid var(--border);
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .status {
      min-height: 22px;
      margin-top: 14px;
      font-size: 13px;
      font-weight: 700;
    }

    .status.ok {
      color: #166534;
    }

    .status.error {
      color: #b91c1c;
    }

    .status.saving {
      color: #92400e;
    }

    .footnote {
      margin-top: 18px;
      font-size: 12px;
      color: #64748b;
      line-height: 1.5;
    }

    @media (max-width: 900px) {
      .login-shell {
        grid-template-columns: 1fr;
      }

      .login-left {
        padding: 34px 28px 24px;
      }

      .hero-title {
        font-size: 34px;
      }

      .hero-copy {
        max-width: none;
      }

      .login-right {
        padding: 28px 22px 30px;
      }
    }
  </style>
</head>
<body>
  <div class="login-shell">
    <div class="login-left">
      <div class="eyebrow">Romanoti Internal Access</div>
      <h1 class="hero-title">Secure sign-in for authorized personnel.</h1>
      <div class="hero-copy">
        Access the Romanoti internal workspace using your corporate credentials.
      </div>
    </div>

    <div class="login-right">
      <div class="login-card">
        <div class="brand-row">
          <div class="brand-mark"></div>
          <div class="brand-text">
            <div class="brand-title">Romanoti CRM</div>
            <div class="brand-subtitle">Internal workspace sign-in</div>
          </div>
        </div>

        <div class="intro">
          Enter your Romanoti email and password to continue.
        </div>

        <form id="loginForm">
          <div class="field">
            <label class="label" for="email">Email</label>
            <input id="email" type="email" placeholder="name@romanoti-solutions.com" autocomplete="username" />
          </div>

          <div class="field">
            <label class="label" for="password">Password</label>
            <input id="password" type="password" placeholder="Your password" autocomplete="current-password" />
          </div>

          <div id="status" class="status"></div>

          <div class="actions">
            <button id="loginBtn" type="submit" class="btn btn-primary">Sign in to CRM</button>
            <a href="/" class="btn btn-secondary">← Back to Romanoti</a>
          </div>
        </form>

        <div class="footnote">
          Authorized Romanoti personnel only.
        </div>
      </div>
    </div>
  </div>

  <script type="module">
    import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

    const sb = createClient(
      "https://rukftaohssovjaatzvkj.supabase.co",
      "sb_publishable_UfLkSw2wUcjkH2sYAmCXBg_-Mqd65z-"
    );

    const form = document.getElementById("loginForm");
    const email = document.getElementById("email");
    const password = document.getElementById("password");
    const status = document.getElementById("status");
    const loginBtn = document.getElementById("loginBtn");

    function setStatus(message, type = "") {
      status.textContent = message;
      status.className = `status ${type}`.trim();
    }

    async function redirectIfSessionExists() {
      const {
        data: { session }
      } = await sb.auth.getSession();

      if (session) {
        window.location.href = "/crm.html";
      }
    }

    await redirectIfSessionExists();

    form.addEventListener("submit", async (event) => {
      event.preventDefault();

      const userEmail = email.value.trim();
      const userPassword = password.value;

      if (!userEmail || !userPassword) {
        setStatus("Please enter your email and password.", "error");
        return;
      }

      try {
        setStatus("Signing in...", "saving");
        loginBtn.disabled = true;

        const { error } = await sb.auth.signInWithPassword({
          email: userEmail,
          password: userPassword
        });

        if (error) throw error;

        setStatus("Login successful. Redirecting...", "ok");
        window.location.href = "/crm.html";
      } catch (err) {
        console.error("CRM login error:", err);
        setStatus(err.message || "Unable to sign in.", "error");
      } finally {
        loginBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
