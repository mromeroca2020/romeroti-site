<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Book a Consultation | Romanoti Solutions</title>

<style>
body{
font-family:Arial;
background:#0f172a;
color:white;
margin:0;
padding:40px;
}

.container{
max-width:800px;
margin:auto;
}

h1{
margin-bottom:10px;
}

form{
background:#111827;
padding:30px;
border-radius:10px;
}

input,select,textarea{
width:100%;
padding:10px;
margin-bottom:15px;
border-radius:6px;
border:1px solid #555;
background:#0f172a;
color:white;
}

button{
background:#f59e0b;
padding:12px 20px;
border:none;
border-radius:6px;
font-weight:bold;
cursor:pointer;
}
</style>
</head>

<body>

<div class="container">

<h1>Book Your IT Consultation</h1>

<p>
Schedule a consultation with Romanoti Solutions for IT support,
cybersecurity, cloud infrastructure, or network troubleshooting.
</p>

<form>

<label>Full Name</label>
<input type="text" required>

<label>Email</label>
<input type="email" required>

<label>Phone</label>
<input type="text">

<label>Company</label>
<input type="text">

<label>Service</label>
<select>
<option>Free Consultation</option>
<option>Emergency Support</option>
<option>Network Support</option>
<option>Cybersecurity Review</option>
</select>

<label>Preferred Date</label>
<input type="date">

<label>Preferred Time</label>
<select>
<option>09:00 AM</option>
<option>10:00 AM</option>
<option>11:00 AM</option>
<option>01:00 PM</option>
<option>02:00 PM</option>
<option>03:00 PM</option>
</select>

<label>Describe your issue</label>
<textarea></textarea>

<button type="submit">Request Appointment</button>

</form>

</div>

</body>
</html>
