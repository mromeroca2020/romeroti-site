<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Book a Consultation | Romanoti Solutions</title>

<style>
body{
font-family:Arial, sans-serif;
background:#0f172a;
color:white;
margin:0;
padding:40px;
}

.container{
max-width:800px;
margin:auto;
}

h1{
margin-bottom:10px;
}

p{
margin-bottom:25px;
line-height:1.5;
}

form{
background:#111827;
padding:30px;
border-radius:10px;
}

label{
display:block;
margin-bottom:6px;
font-weight:bold;
}

input,select,textarea{
width:100%;
padding:10px;
margin-bottom:15px;
border-radius:6px;
border:1px solid #555;
background:#0f172a;
color:white;
box-sizing:border-box;
}

textarea{
min-height:120px;
resize:vertical;
}

button{
background:#f59e0b;
padding:12px 20px;
border:none;
border-radius:6px;
font-weight:bold;
cursor:pointer;
}

button:hover{
opacity:0.92;
}
</style>
</head>

<body>

<!-- ============================================================
     CHANGE #1 (HIDDEN BACKUP FORM FOR NETLIFY):
     Este formulario oculto ayuda a que Netlify detecte el formulario
     "booking" de forma más confiable durante el build.
     No se muestra al usuario.
     ============================================================ -->
<form name="booking" netlify hidden>
  <input type="text" name="fullname">
  <input type="email" name="email">
  <input type="text" name="phone">
  <input type="text" name="company">
  <input type="text" name="service">
  <input type="text" name="date">
  <input type="text" name="time">
  <textarea name="issue"></textarea>
</form>

<div class="container">

<h1>Book Your IT Consultation</h1>

<p>
Schedule a consultation with Romanoti Solutions for IT support,
cybersecurity, cloud infrastructure, or network troubleshooting.
</p>

<!-- ============================================================
     CHANGE #2 (PRIMARY NETLIFY FORM):
     Formulario principal conectado a Netlify Forms.
     - name="booking"
     - method="POST"
     - data-netlify="true"
     - action="/thank-you.html"
     Esto permite registrar leads y luego redirigir a la página de confirmación.
     ============================================================ -->
<form name="booking" method="POST" data-netlify="true" action="/thank-you.html">
<input type="hidden" name="form-name" value="booking">

<label for="fullname">Full Name</label>
<input id="fullname" name="fullname" type="text" required>

<label for="email">Email</label>
<input id="email" name="email" type="email" required>

<label for="phone">Phone</label>
<input id="phone" name="phone" type="text">

<label for="company">Company</label>
<input id="company" name="company" type="text">

<label for="service">Service</label>
<select id="service" name="service">
<option>Free Consultation</option>
<option>Emergency Support</option>
<option>Network Support</option>
<option>Cybersecurity Review</option>
</select>

<label for="date">Preferred Date</label>
<input id="date" name="date" type="date">

<label for="time">Preferred Time</label>
<select id="time" name="time">
<option>09:00 AM</option>
<option>10:00 AM</option>
<option>11:00 AM</option>
<option>01:00 PM</option>
<option>02:00 PM</option>
<option>03:00 PM</option>
</select>

<label for="issue">Describe your issue</label>
<textarea id="issue" name="issue"></textarea>

<button type="submit">Request Appointment</button>
</form>

</div>

<!-- ============================================================
     CHANGE #3 (AUTO SERVICE SELECTION):
     Si la URL contiene ?service=Free%20Consultation o
     ?service=Emergency%20Support, el formulario selecciona
     automáticamente el servicio correspondiente.
     ============================================================ -->
<script>
const params = new URLSearchParams(window.location.search);
const service = params.get("service");
if (service) {
  const serviceSelect = document.querySelector('select[name="service"]');
  if (serviceSelect) serviceSelect.value = service;
}
</script>

</body>
</html>
