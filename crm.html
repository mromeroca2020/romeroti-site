<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Romanoti CRM</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 30px;
      background: #f7f9fc;
      color: #1f2937;
    }

    h1 {
      margin-bottom: 20px;
      font-size: 2rem;
    }

    h3 {
      margin: 0 0 12px 0;
    }

    .card {
      background: #ffffff;
      border: 1px solid #dbe3ec;
      border-radius: 12px;
      padding: 20px;
      box-shadow: 0 4px 14px rgba(0, 0, 0, 0.06);
      max-width: 1400px;
      margin-bottom: 20px;
    }

    .muted {
      color: #6b7280;
      margin-bottom: 10px;
    }

    .ok {
      color: #166534;
      font-weight: bold;
      margin-bottom: 10px;
    }

    .error {
      color: #b91c1c;
      font-weight: bold;
      margin-bottom: 10px;
    }

    .saving {
      color: #92400e;
      font-weight: bold;
      margin-bottom: 10px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 10px;
      background: #ffffff;
    }

    th,
    td {
      border: 1px solid #dbe3ec;
      padding: 12px;
      text-align: left;
      vertical-align: top;
    }

    th {
      background: #0f172a;
      color: #ffffff;
    }

    tr:nth-child(even) {
      background: #f8fafc;
    }

    .clickable-row {
      cursor: pointer;
    }

    .clickable-row:hover {
      background: #eef4ff !important;
    }

    select,
    input[type="datetime-local"] {
      padding: 6px 8px;
      border: 1px solid #cbd5e1;
      border-radius: 6px;
      background: #ffffff;
      cursor: pointer;
      width: 100%;
      box-sizing: border-box;
    }

    textarea {
      width: 100%;
      min-height: 60px;
      resize: vertical;
      padding: 8px;
      border: 1px solid #cbd5e1;
      border-radius: 6px;
      background: #ffffff;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    .small-note {
      margin-top: 14px;
      font-size: 0.9rem;
      color: #6b7280;
    }

    .priority-low {
      color: #475569;
      font-weight: bold;
    }

    .priority-medium {
      color: #b45309;
      font-weight: bold;
    }

    .priority-high {
      color: #b91c1c;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <h1>Romanoti CRM</h1>

  <div class="card">
    <p class="muted">Leads panel connected to Supabase.</p>
    <div id="statusMessage">Loading leads...</div>

    <table id="leadsTable">
      <thead>
        <tr>
          <th>Name</th>
          <th>Email</th>
          <th>Company</th>
          <th>Phone</th>
          <th>Status</th>
          <th>Priority</th>
          <th>Next Follow-up</th>
          <th>Source</th>
          <th>Notes</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>

    <p class="small-note">
      Status, priority, follow-up date and notes are updated directly from this panel. Click a lead row to view activity history.
    </p>
  </div>

  <div class="card" id="leadDetail" style="display:none;">
    <h3>Lead Activity</h3>
    <div id="leadDetailHeader" class="muted"></div>

    <table>
      <thead>
        <tr>
          <th>When</th>
          <th>Type</th>
          <th>Description</th>
        </tr>
      </thead>
      <tbody id="eventsTableBody"></tbody>
    </table>
  </div>

  <script type="module">
    import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

    const sb = createClient(
      "https://rukftaohssovjaatzvkj.supabase.co",
      "sb_publishable_UfLkSw2wUcjkH2sYAmCXBg_-Mqd65z-"
    );

    const tableBody = document.querySelector("#leadsTable tbody");
    const statusMessage = document.getElementById("statusMessage");
    const leadDetail = document.getElementById("leadDetail");
    const leadDetailHeader = document.getElementById("leadDetailHeader");
    const eventsTableBody = document.getElementById("eventsTableBody");

    function setStatusMessage(message, cssClass = "") {
      statusMessage.textContent = message;
      statusMessage.className = cssClass;
    }

    async function saveLeadEvent(leadId, eventType, description) {
      try {
        const { error } = await sb.from("lead_events").insert([
          {
            lead_id: leadId,
            event_type: eventType,
            description: description
          }
        ]);

        if (error) {
          console.error("Lead event insert error:", error);
        }
      } catch (err) {
        console.error("Unexpected lead event error:", err);
      }
    }

    async function updateStatus(id, newStatus) {
      try {
        setStatusMessage("Saving status...", "saving");

        const { error } = await sb
          .from("leads")
          .update({ pipeline_stage: newStatus })
          .eq("id", id);

        if (error) throw error;

        await saveLeadEvent(id, "status_change", "Status changed to " + newStatus);
        setStatusMessage("Status updated successfully.", "ok");
      } catch (err) {
        console.error("updateStatus error:", err);
        setStatusMessage("Error updating status: " + err.message, "error");
        alert("Error updating status: " + err.message);
      }
    }

    async function updatePriority(id, newPriority) {
      try {
        setStatusMessage("Saving priority...", "saving");

        const { error } = await sb
          .from("leads")
          .update({ priority: newPriority })
          .eq("id", id);

        if (error) throw error;

        await saveLeadEvent(id, "priority_change", "Priority changed to " + newPriority);
        setStatusMessage("Priority updated successfully.", "ok");
      } catch (err) {
        console.error("updatePriority error:", err);
        setStatusMessage("Error updating priority: " + err.message, "error");
        alert("Error updating priority: " + err.message);
      }
    }

    async function updateFollowup(id, newFollowup) {
      try {
        setStatusMessage("Saving follow-up...", "saving");

        const valueToSave = newFollowup ? new Date(newFollowup).toISOString() : null;

        const { error } = await sb
          .from("leads")
          .update({ next_followup: valueToSave })
          .eq("id", id);

        if (error) throw error;

        await saveLeadEvent(
          id,
          "followup_change",
          valueToSave ? "Next follow-up set to " + valueToSave : "Next follow-up cleared"
        );

        setStatusMessage("Follow-up updated successfully.", "ok");
      } catch (err) {
        console.error("updateFollowup error:", err);
        setStatusMessage("Error updating follow-up: " + err.message, "error");
        alert("Error updating follow-up: " + err.message);
      }
    }

    async function updateNotes(id, newNotes) {
      try {
        setStatusMessage("Saving notes...", "saving");

        const { error } = await sb
          .from("leads")
          .update({ notes: newNotes })
          .eq("id", id);

        if (error) throw error;

        await saveLeadEvent(id, "notes_update", "Notes updated");
        setStatusMessage("Notes updated successfully.", "ok");
      } catch (err) {
        console.error("updateNotes error:", err);
        setStatusMessage("Error saving notes: " + err.message, "error");
        alert("Error saving notes: " + err.message);
      }
    }

    async function loadLeadEvents(lead) {
      try {
        leadDetail.style.display = "block";
        leadDetailHeader.textContent = `Activity for ${lead.name || lead.email}`;

        eventsTableBody.innerHTML = `
          <tr>
            <td colspan="3">Loading activity...</td>
          </tr>
        `;

        const { data, error } = await sb
          .from("lead_events")
          .select("*")
          .eq("lead_id", lead.id)
          .order("created_at", { ascending: false });

        if (error) {
          eventsTableBody.innerHTML = `
            <tr>
              <td colspan="3">Error loading activity: ${error.message}</td>
            </tr>
          `;
          return;
        }

        if (!data || data.length === 0) {
          eventsTableBody.innerHTML = `
            <tr>
              <td colspan="3">No activity yet.</td>
            </tr>
          `;
          return;
        }

        eventsTableBody.innerHTML = "";

        data.forEach((event) => {
          const row = document.createElement("tr");
          const when = event.created_at ? new Date(event.created_at).toLocaleString() : "";

          row.innerHTML = `
            <td>${when}</td>
            <td>${event.event_type ?? ""}</td>
            <td>${event.description ?? ""}</td>
          `;

          eventsTableBody.appendChild(row);
        });
      } catch (err) {
        console.error("loadLeadEvents error:", err);
        eventsTableBody.innerHTML = `
          <tr>
            <td colspan="3">Unexpected error loading activity.</td>
          </tr>
        `;
      }
    }

    function toDatetimeLocalValue(value) {
      if (!value) return "";
      const date = new Date(value);
      const pad = (n) => String(n).padStart(2, "0");
      const yyyy = date.getFullYear();
      const mm = pad(date.getMonth() + 1);
      const dd = pad(date.getDate());
      const hh = pad(date.getHours());
      const mi = pad(date.getMinutes());
      return `${yyyy}-${mm}-${dd}T${hh}:${mi}`;
    }

    async function loadLeads() {
      try {
        setStatusMessage("Loading leads...");

        const { data, error } = await sb
          .from("leads")
          .select("*")
          .order("created_at", { ascending: false });

        tableBody.innerHTML = "";

        if (error) {
          setStatusMessage("Error loading leads: " + error.message, "error");
          return;
        }

        if (!data || data.length === 0) {
          setStatusMessage("No leads found.");
          tableBody.innerHTML = `
            <tr>
              <td colspan="9">No records available yet.</td>
            </tr>
          `;
          return;
        }

        setStatusMessage("Leads loaded successfully.", "ok");

        data.forEach((lead) => {
          const row = document.createElement("tr");
          row.classList.add("clickable-row");

          row.innerHTML = `
            <td>${lead.name ?? ""}</td>
            <td>${lead.email ?? ""}</td>
            <td>${lead.company ?? ""}</td>
            <td>${lead.phone ?? ""}</td>
            <td>
              <select data-id="${lead.id}">
                <option value="new" ${lead.pipeline_stage === "new" ? "selected" : ""}>new</option>
                <option value="contacted" ${lead.pipeline_stage === "contacted" ? "selected" : ""}>contacted</option>
                <option value="meeting" ${lead.pipeline_stage === "meeting" ? "selected" : ""}>meeting</option>
                <option value="proposal" ${lead.pipeline_stage === "proposal" ? "selected" : ""}>proposal</option>
                <option value="closed" ${lead.pipeline_stage === "closed" ? "selected" : ""}>closed</option>
              </select>
            </td>
            <td>
              <select data-priority-id="${lead.id}" class="priority-${lead.priority ?? "medium"}">
                <option value="low" ${(lead.priority ?? "medium") === "low" ? "selected" : ""}>low</option>
                <option value="medium" ${(lead.priority ?? "medium") === "medium" ? "selected" : ""}>medium</option>
                <option value="high" ${(lead.priority ?? "medium") === "high" ? "selected" : ""}>high</option>
              </select>
            </td>
            <td>
              <input
                type="datetime-local"
                data-followup-id="${lead.id}"
                value="${toDatetimeLocalValue(lead.next_followup)}"
              />
            </td>
            <td>${lead.source ?? ""}</td>
            <td>
              <textarea data-id="${lead.id}" rows="2">${lead.notes ?? ""}</textarea>
            </td>
          `;

          row.addEventListener("click", (event) => {
            const tag = event.target.tagName.toLowerCase();
            if (tag === "select" || tag === "textarea" || tag === "input" || tag === "option") {
              return;
            }
            loadLeadEvents(lead);
          });

          const statusSelect = row.querySelector("select[data-id]");
          statusSelect.addEventListener("change", (e) => {
            updateStatus(e.target.dataset.id, e.target.value);
          });

          const prioritySelect = row.querySelector("select[data-priority-id]");
          prioritySelect.addEventListener("change", (e) => {
            e.target.className = "priority-" + e.target.value;
            updatePriority(e.target.dataset.priorityId, e.target.value);
          });

          const followupInput = row.querySelector("input[data-followup-id]");
          followupInput.addEventListener("change", (e) => {
            updateFollowup(e.target.dataset.followupId, e.target.value);
          });

          const textarea = row.querySelector("textarea[data-id]");
          textarea.addEventListener("change", (e) => {
            updateNotes(e.target.dataset.id, e.target.value);
          });

          tableBody.appendChild(row);
        });
      } catch (err) {
        console.error("Unexpected loadLeads error:", err);
        setStatusMessage("Unexpected error: " + err.message, "error");
      }
    }

    loadLeads();
  </script>
</body>
</html>
