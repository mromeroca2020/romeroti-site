<!DOCTYPE html>
<html lang="en">
<head>
  <!-- =========================
       Basic document setup
       ========================= -->
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Romanoti CRM</title>

  <style>
    /* =========================
       Global page styling
       Keeps the interface clean
       and easy to read
       ========================= */
    body {
      font-family: Arial, sans-serif;
      margin: 30px;
      background: #f7f9fc;
      color: #1f2937;
    }

    h1 {
      margin-bottom: 20px;
      font-size: 2rem;
    }

    .card {
      background: #ffffff;
      border: 1px solid #dbe3ec;
      border-radius: 12px;
      padding: 20px;
      box-shadow: 0 4px 14px rgba(0, 0, 0, 0.06);
      max-width: 1200px;
    }

    .muted {
      color: #6b7280;
      margin-bottom: 10px;
    }

    .ok {
      color: #166534;
      font-weight: bold;
      margin-bottom: 10px;
    }

    .error {
      color: #b91c1c;
      font-weight: bold;
      margin-bottom: 10px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 10px;
      background: #ffffff;
    }

    th,
    td {
      border: 1px solid #dbe3ec;
      padding: 12px;
      text-align: left;
      vertical-align: top;
    }

    th {
      background: #0f172a;
      color: #ffffff;
    }

    tr:nth-child(even) {
      background: #f8fafc;
    }

    select {
      padding: 6px 8px;
      border: 1px solid #cbd5e1;
      border-radius: 6px;
      background: #ffffff;
      cursor: pointer;
    }

    .small-note {
      margin-top: 14px;
      font-size: 0.9rem;
      color: #6b7280;
    }
  </style>
</head>
<body>

  <!-- =========================
       Main title
       ========================= -->
  <h1>Romanoti CRM</h1>

  <!-- =========================
       Main content container
       ========================= -->
  <div class="card">
    <p class="muted">
      Leads panel connected to Supabase.
    </p>

    <!-- =========================
         Status / feedback message
         Shows loading, success or error
         ========================= -->
    <div id="statusMessage">Loading leads...</div>

    <!-- =========================
         Leads table
         Populated dynamically from Supabase
         ========================= -->
    <table id="leadsTable">
      <thead>
        <tr>
          <th>Name</th>
          <th>Email</th>
          <th>Company</th>
          <th>Phone</th>
          <th>Status</th>
          <th>Source</th>
          <th>Notes</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>

    <p class="small-note">
      Status can be updated directly from this panel.
    </p>
  </div>

  <!-- =========================
       Supabase browser library
       IMPORTANT:
       - Safe only with publishable key
       - Never use sb_secret here
       ========================= -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

  <script>
    /* =========================
       Supabase client connection
       Uses your project URL and
       your publishable key
       ========================= */
    const sb = window.supabase.createClient(
      "https://rukftaohssovjaatzvkj.supabase.co",
      "sb_publishable_UfLkSw2wUcjkH2sYAmCXBg_-Mqd65z-"
    );

    /* =========================
       DOM references
       ========================= */
    const tableBody = document.querySelector("#leadsTable tbody");
    const statusMessage = document.getElementById("statusMessage");

    /* =========================
       Update lead pipeline status
       Triggered when user changes
       the dropdown value
       ========================= */
    async function updateStatus(id, newStatus) {
      try {
        const { error } = await sb
          .from("leads")
          .update({ pipeline_stage: newStatus })
          .eq("id", id);

        if (error) {
          console.error("Update status error:", error);
          alert("Error updating status: " + error.message);
          return;
        }

        console.log("Status updated successfully");
      } catch (err) {
        console.error("Unexpected status update error:", err);
        alert("Unexpected error updating status");
      }
    }

    /* =========================
       Load leads from Supabase
       and render them in table
       ========================= */
    async function loadLeads() {
      try {
        // Show loading state
        statusMessage.textContent = "Loading leads...";
        statusMessage.className = "";

        // Read all leads ordered by newest first
        const { data, error } = await sb
          .from("leads")
          .select("*")
          .order("created_at", { ascending: false });

        // Useful debugging logs
        console.log("Supabase data:", data);
        console.log("Supabase error:", error);

        // Reset table before repopulating
        tableBody.innerHTML = "";

        // Handle database error
        if (error) {
          statusMessage.textContent = "Error loading leads: " + error.message;
          statusMessage.className = "error";
          return;
        }

        // Handle empty dataset
        if (!data || data.length === 0) {
          statusMessage.textContent = "No leads found.";
          statusMessage.className = "";
          tableBody.innerHTML = `
            <tr>
              <td colspan="6">No records available yet.</td>
            </tr>
          `;
          return;
        }

        // Success feedback
        statusMessage.textContent = "Leads loaded successfully.";
        statusMessage.className = "ok";

        // Create one row per lead
        data.forEach((lead) => {
          const row = document.createElement("tr");

          row.innerHTML = `
            <td>${lead.name ?? ""}</td>
            <td>${lead.email ?? ""}</td>
            <td>${lead.company ?? ""}</td>
            <td>${lead.phone ?? ""}</td>
            <td>
              <select onchange="updateStatus('${lead.id}', this.value)">
                <option value="new" ${lead.pipeline_stage === "new" ? "selected" : ""}>new</option>
                <option value="contacted" ${lead.pipeline_stage === "contacted" ? "selected" : ""}>contacted</option>
                <option value="meeting" ${lead.pipeline_stage === "meeting" ? "selected" : ""}>meeting</option>
                <option value="proposal" ${lead.pipeline_stage === "proposal" ? "selected" : ""}>proposal</option>
                <option value="closed" ${lead.pipeline_stage === "closed" ? "selected" : ""}>closed</option>
              </select>
            </td>
           <td>${lead.source ?? ""}</td>

            <td>
              <textarea 
                rows="2"
                style="width:100%"
                onchange="updateNotes('${lead.id}', this.value)"
              >${lead.notes ?? ""}</textarea>
            </td>
                      `;

          tableBody.appendChild(row);
        });

      } catch (err) {
        // Catch unexpected runtime errors
        console.error("Unexpected error:", err);
        statusMessage.textContent = "Unexpected error: " + err.message;
        statusMessage.className = "error";
      }
    }

    /* =========================
       Expose function globally
       because onchange in HTML
       needs access to it
       ========================= */
    window.updateStatus = updateStatus;
    async function updateNotes(id, newNotes) {
  try {
    const { error } = await sb
      .from("leads")
      .update({ notes: newNotes })
      .eq("id", id);

    if (error) {
      alert("Error saving notes");
      console.error(error);
    } else {
      console.log("Notes updated");
    }
  } catch (err) {
    console.error(err);
    alert("Unexpected error saving notes");
  }
}
    window.updateNotes = updateNotes;

    /* =========================
       Initial page load
       ========================= */
    loadLeads();
  </script>

</body>
</html>
