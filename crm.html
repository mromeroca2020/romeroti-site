<!DOCTYPE html>
<html lang="en">
<head>
  <!-- =========================
       Basic document setup
       ========================= -->
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Romanoti CRM</title>

  <style>
    /* =========================
       Global page styling
       ========================= */
    body {
      font-family: Arial, sans-serif;
      margin: 30px;
      background: #f7f9fc;
      color: #1f2937;
    }

    h1 {
      margin-bottom: 20px;
      font-size: 2rem;
    }

    h3 {
      margin: 0 0 12px 0;
    }

    .card {
      background: #ffffff;
      border: 1px solid #dbe3ec;
      border-radius: 12px;
      padding: 20px;
      box-shadow: 0 4px 14px rgba(0, 0, 0, 0.06);
      max-width: 1200px;
      margin-bottom: 20px;
    }

    .muted {
      color: #6b7280;
      margin-bottom: 10px;
    }

    .ok {
      color: #166534;
      font-weight: bold;
      margin-bottom: 10px;
    }

    .error {
      color: #b91c1c;
      font-weight: bold;
      margin-bottom: 10px;
    }

    .saving {
      color: #92400e;
      font-weight: bold;
      margin-bottom: 10px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 10px;
      background: #ffffff;
    }

    th,
    td {
      border: 1px solid #dbe3ec;
      padding: 12px;
      text-align: left;
      vertical-align: top;
    }

    th {
      background: #0f172a;
      color: #ffffff;
    }

    tr:nth-child(even) {
      background: #f8fafc;
    }

    .clickable-row {
      cursor: pointer;
    }

    .clickable-row:hover {
      background: #eef4ff !important;
    }

    select {
      padding: 6px 8px;
      border: 1px solid #cbd5e1;
      border-radius: 6px;
      background: #ffffff;
      cursor: pointer;
      width: 100%;
    }

    textarea {
      width: 100%;
      min-height: 60px;
      resize: vertical;
      padding: 8px;
      border: 1px solid #cbd5e1;
      border-radius: 6px;
      background: #ffffff;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    .small-note {
      margin-top: 14px;
      font-size: 0.9rem;
      color: #6b7280;
    }
  </style>
</head>
<body>

  <!-- =========================
       Main page title
       ========================= -->
  <h1>Romanoti CRM</h1>

  <!-- =========================
       Main leads panel
       ========================= -->
  <div class="card">
    <p class="muted">
      Leads panel connected to Supabase.
    </p>

    <!-- =========================
         Global status message area
         Used for loading, saving,
         success, and error feedback
         ========================= -->
    <div id="statusMessage">Loading leads...</div>

    <!-- =========================
         Leads table
         One row per lead
         ========================= -->
    <table id="leadsTable">
      <thead>
        <tr>
          <th>Name</th>
          <th>Email</th>
          <th>Company</th>
          <th>Phone</th>
          <th>Status</th>
          <th>Source</th>
          <th>Notes</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>

    <p class="small-note">
      Status and notes are updated directly from this panel. Click a lead row to view activity history.
    </p>
  </div>

  <!-- =========================
       Lead activity panel
       Hidden until a lead is clicked
       ========================= -->
  <div class="card" id="leadDetail" style="display:none;">
    <h3>Lead Activity</h3>
    <div id="leadDetailHeader" class="muted"></div>

    <table>
      <thead>
        <tr>
          <th>When</th>
          <th>Type</th>
          <th>Description</th>
        </tr>
      </thead>
      <tbody id="eventsTableBody"></tbody>
    </table>
  </div>

  <!-- =========================
       Supabase ES module import
       This is safer and more stable
       than relying on window globals
       ========================= -->
  <script type="module">
    import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

    /* =========================
       Supabase client connection
       IMPORTANT:
       - Use only publishable key here
       - Never use sb_secret on frontend
       ========================= */
    const sb = createClient(
      "https://rukftaohssovjaatzvkj.supabase.co",
      "sb_publishable_UfLkSw2wUcjkH2sYAmCXBg_-Mqd65z-"
    );

    /* =========================
       DOM references
       ========================= */
    const tableBody = document.querySelector("#leadsTable tbody");
    const statusMessage = document.getElementById("statusMessage");
    const leadDetail = document.getElementById("leadDetail");
    const leadDetailHeader = document.getElementById("leadDetailHeader");
    const eventsTableBody = document.getElementById("eventsTableBody");

    /* =========================
       Helper to set top status text
       ========================= */
    function setStatusMessage(message, cssClass = "") {
      statusMessage.textContent = message;
      statusMessage.className = cssClass;
    }

    /* =========================
       Save an event to lead_events
       This should never break
       the main UX if it fails
       ========================= */
    async function saveLeadEvent(leadId, eventType, description) {
      try {
        const { error } = await sb.from("lead_events").insert([
          {
            lead_id: leadId,
            event_type: eventType,
            description: description
          }
        ]);

        if (error) {
          console.error("Lead event insert error:", error);
        }
      } catch (err) {
        console.error("Unexpected lead event error:", err);
      }
    }

    /* =========================
       Update pipeline stage
       ========================= */
    async function updateStatus(id, newStatus) {
      try {
        setStatusMessage("Saving status...", "saving");

        const { error } = await sb
          .from("leads")
          .update({ pipeline_stage: newStatus })
          .eq("id", id);

        if (error) throw error;

        await saveLeadEvent(
          id,
          "status_change",
          "Status changed to " + newStatus
        );

        setStatusMessage("Status updated successfully.", "ok");
      } catch (err) {
        console.error("updateStatus error:", err);
        setStatusMessage("Error updating status: " + err.message, "error");
        alert("Error updating status: " + err.message);
      }
    }

    /* =========================
       Update notes for a lead
       ========================= */
    async function updateNotes(id, newNotes) {
      try {
        setStatusMessage("Saving notes...", "saving");

        const { error } = await sb
          .from("leads")
          .update({ notes: newNotes })
          .eq("id", id);

        if (error) throw error;

        await saveLeadEvent(
          id,
          "notes_update",
          "Notes updated"
        );

        setStatusMessage("Notes updated successfully.", "ok");
      } catch (err) {
        console.error("updateNotes error:", err);
        setStatusMessage("Error saving notes: " + err.message, "error");
        alert("Error saving notes: " + err.message);
      }
    }

    /* =========================
       Load activity history
       for one selected lead
       ========================= */
    async function loadLeadEvents(lead) {
      try {
        leadDetail.style.display = "block";
        leadDetailHeader.textContent = `Activity for ${lead.name || lead.email}`;

        eventsTableBody.innerHTML = `
          <tr>
            <td colspan="3">Loading activity...</td>
          </tr>
        `;

        const { data, error } = await sb
          .from("lead_events")
          .select("*")
          .eq("lead_id", lead.id)
          .order("created_at", { ascending: false });

        if (error) {
          eventsTableBody.innerHTML = `
            <tr>
              <td colspan="3">Error loading activity: ${error.message}</td>
            </tr>
          `;
          return;
        }

        if (!data || data.length === 0) {
          eventsTableBody.innerHTML = `
            <tr>
              <td colspan="3">No activity yet.</td>
            </tr>
          `;
          return;
        }

        eventsTableBody.innerHTML = "";

        data.forEach((event) => {
          const row = document.createElement("tr");

          const when = event.created_at
            ? new Date(event.created_at).toLocaleString()
            : "";

          row.innerHTML = `
            <td>${when}</td>
            <td>${event.event_type ?? ""}</td>
            <td>${event.description ?? ""}</td>
          `;

          eventsTableBody.appendChild(row);
        });
      } catch (err) {
        console.error("loadLeadEvents error:", err);
        eventsTableBody.innerHTML = `
          <tr>
            <td colspan="3">Unexpected error loading activity.</td>
          </tr>
        `;
      }
    }

    /* =========================
       Load all leads and render
       the table
       ========================= */
    async function loadLeads() {
      try {
        setStatusMessage("Loading leads...");

        const { data, error } = await sb
          .from("leads")
          .select("*")
          .order("created_at", { ascending: false });

        console.log("Supabase data:", data);
        console.log("Supabase error:", error);

        tableBody.innerHTML = "";

        if (error) {
          setStatusMessage("Error loading leads: " + error.message, "error");
          return;
        }

        if (!data || data.length === 0) {
          setStatusMessage("No leads found.");
          tableBody.innerHTML = `
            <tr>
              <td colspan="7">No records available yet.</td>
            </tr>
          `;
          return;
        }

        setStatusMessage("Leads loaded successfully.", "ok");

        data.forEach((lead) => {
          const row = document.createElement("tr");
          row.classList.add("clickable-row");

          row.innerHTML = `
            <td>${lead.name ?? ""}</td>
            <td>${lead.email ?? ""}</td>
            <td>${lead.company ?? ""}</td>
            <td>${lead.phone ?? ""}</td>
            <td>
              <select data-id="${lead.id}">
                <option value="new" ${lead.pipeline_stage === "new" ? "selected" : ""}>new</option>
                <option value="contacted" ${lead.pipeline_stage === "contacted" ? "selected" : ""}>contacted</option>
                <option value="meeting" ${lead.pipeline_stage === "meeting" ? "selected" : ""}>meeting</option>
                <option value="proposal" ${lead.pipeline_stage === "proposal" ? "selected" : ""}>proposal</option>
                <option value="closed" ${lead.pipeline_stage === "closed" ? "selected" : ""}>closed</option>
              </select>
            </td>
            <td>${lead.source ?? ""}</td>
            <td>
              <textarea data-id="${lead.id}" rows="2">${lead.notes ?? ""}</textarea>
            </td>
          `;

          /* =========================
             Row click = load detail
             We prevent row detail loading
             when user clicks inside inputs
             ========================= */
          row.addEventListener("click", (event) => {
            const tag = event.target.tagName.toLowerCase();
            if (tag === "select" || tag === "textarea" || tag === "option") {
              return;
            }
            loadLeadEvents(lead);
          });

          /* =========================
             Status change listener
             ========================= */
          const select = row.querySelector("select");
          select.addEventListener("change", (e) => {
            updateStatus(e.target.dataset.id, e.target.value);
          });

          /* =========================
             Notes change listener
             ========================= */
          const textarea = row.querySelector("textarea");
          textarea.addEventListener("change", (e) => {
            updateNotes(e.target.dataset.id, e.target.value);
          });

          tableBody.appendChild(row);
        });
      } catch (err) {
        console.error("Unexpected loadLeads error:", err);
        setStatusMessage("Unexpected error: " + err.message, "error");
      }
    }

    /* =========================
       Initial page load
       ========================= */
    loadLeads();
  </script>

</body>
</html>
